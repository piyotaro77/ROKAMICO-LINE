function figureSize() {
var w = 360, h = 640;
// Try multiple ways to get the actual size
if (canvas.offsetWidth > 0 && canvas.offsetHeight > 0) {
w = canvas.offsetWidth;
h = canvas.offsetHeight;
} else if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
w = canvas.clientWidth;
h = canvas.clientHeight;
} else if (canvas.parentElement && canvas.parentElement.offsetWidth > 0) {
w = canvas.parentElement.offsetWidth;
h = canvas.parentElement.offsetHeight;
} else if (document.documentElement.clientWidth > 0) {
w = document.documentElement.clientWidth;
h = document.documentElement.clientHeight;
} else if (window.innerWidth > 0) {
w = window.innerWidth;
h = window.innerHeight;
}
return { w: Math.max(w, 300), h: Math.max(h, 400) };
}

function doResize() {
var s = figureSize();
W = s.w; H = s.h;
canvas.width = W;
canvas.height = H;
}

// Use ResizeObserver if available
if (typeof ResizeObserver !== “undefined”) {
var ro = new ResizeObserver(function() { doResize(); });
ro.observe(canvas);
if (canvas.parentElement) ro.observe(canvas.parentElement);
ro.observe(document.body);
}
window.addEventListener(“resize”, doResize);

function rrF(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.fill();}
function rrS(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.stroke();}

function wYf(x,t){return wl+Math.sin(x*0.015+t*2)*6+Math.sin(x*0.008+t*1.3)*4;}

function dPoi(x,y,h){
ctx.save();ctx.translate(x,y);
ctx.beginPath();ctx.moveTo(0,-PR-8);ctx.lineTo(0,-PR-28);
ctx.strokeStyle=”#d4a373”;ctx.lineWidth=5;ctx.lineCap=“round”;ctx.stroke();
ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);ctx.strokeStyle=”#e76f51”;ctx.lineWidth=4;ctx.stroke();
var pa=0.2+(h/MH)*0.5;
ctx.beginPath();ctx.arc(0,0,PR-3,0,Math.PI*2);ctx.fillStyle=“rgba(255,255,255,”+pa+”)”;ctx.fill();
if(h>0){ctx.save();ctx.beginPath();ctx.arc(0,0,PR-4,0,Math.PI*2);ctx.clip();
ctx.strokeStyle=“rgba(200,200,200,”+(pa*0.6)+”)”;ctx.lineWidth=0.5;
for(var i=-PR;i<PR;i+=8){ctx.beginPath();ctx.moveTo(i,-PR);ctx.lineTo(i,PR);ctx.stroke();
ctx.beginPath();ctx.moveTo(-PR,i);ctx.lineTo(PR,i);ctx.stroke();}ctx.restore();}
if(h<MH){var hl=MH-h;ctx.save();ctx.beginPath();ctx.arc(0,0,PR-3,0,Math.PI*2);ctx.clip();
for(var j=0;j<hl;j++){var an=(j/hl)*Math.PI*2+0.5,dd=8+j*4;
ctx.beginPath();ctx.arc(Math.cos(an)*dd,Math.sin(an)*dd,4+j,0,Math.PI*2);
ctx.fillStyle=“rgba(135,206,250,0.3)”;ctx.fill();}ctx.restore();}
ctx.restore();
}

function dWat(t){
ctx.beginPath();ctx.moveTo(0,H);
for(var x=0;x<=W;x+=4)ctx.lineTo(x,wYf(x,t));
ctx.lineTo(W,H);ctx.closePath();
var g=ctx.createLinearGradient(0,wl,0,H);
g.addColorStop(0,“rgba(147,197,253,0.35)”);g.addColorStop(0.4,“rgba(147,197,253,0.5)”);
g.addColorStop(1,“rgba(96,165,250,0.6)”);ctx.fillStyle=g;ctx.fill();
ctx.beginPath();
for(var x2=0;x2<=W;x2+=4){var yy=wYf(x2,t);if(x2===0)ctx.moveTo(x2,yy);else ctx.lineTo(x2,yy);}
ctx.strokeStyle=“rgba(255,255,255,0.6)”;ctx.lineWidth=2;ctx.stroke();
}

function dFish(f,t){
ctx.save();var wy=Math.sin(f.wb)*f.wa;
var dx=f.x,dy=f.ct?f.cy:f.y+wy;
ctx.translate(dx,dy);if(f.d===1)ctx.scale(-1,1);
if(!f.ct){ctx.fillStyle=“rgba(0,0,0,0.06)”;ctx.beginPath();
ctx.ellipse(0,f.sz*0.4,f.sz*0.7,f.sz*0.15,0,0,Math.PI*2);ctx.fill();}
ctx.font=f.sz+“px serif”;ctx.textAlign=“center”;ctx.textBaseline=“middle”;
if(f.tp.ra){ctx.shadowColor=f.tp.c;ctx.shadowBlur=12;}
if(f.tp.ob){ctx.shadowColor=”#ef4444”;ctx.shadowBlur=10;}
ctx.fillText(f.tp.e,0,0);ctx.shadowBlur=0;
if(f.tp.ra&&!f.ct){for(var i=0;i<3;i++){var an=t*3+(i/3)*Math.PI*2;
ctx.font=“8px serif”;ctx.globalAlpha=0.4+Math.sin(t*5+i)*0.3;
ctx.fillText(“✨”,Math.cos(an)*f.sz*0.6,Math.sin(an)*f.sz*0.4);}ctx.globalAlpha=1;}
ctx.restore();
}

ctx.fillStyle=“rgba(255,255,255,0.85)”;rrF(12,10,W-24,56,16);

ctx.font=“bold 11px “+F;ctx.fillStyle=”#94a3b8”;ctx.fillText(“🐟”+sc+“ぴき”,24,52);
ctx.textAlign=“center”;var tl=Math.max(0,Math.ceil(tmr));
ctx.fillStyle=tl<=5?”#ef4444”:”#6366f1”;ctx.fillText(“⏱ “+tl+“s”,W/2,44);
ctx.textAlign=“right”;var hh=””;for(var j=0;j<MH;j++)hh+=j<hp?“🟢”:“⚫”;
ctx.font=“14px serif”;ctx.fillText(hh,W-24,42);
ctx.font=“bold 10px “+F;ctx.fillStyle=”#94a3b8”;ctx.fillText(“ポイHP”,W-50,26);
}

function dTitle(t){
ctx.fillStyle=”#f0f9ff”;ctx.fillRect(0,0,W,H);
for(var i=0;i<15;i++){var bx=(W*0.1)+(i*W*0.06)%W,by=H*0.3+Math.sin(t*1.5+i*0.8)*30+(i*37)%(H*0.5);
ctx.beginPath();ctx.arc(bx,by,8+(i%4)*5,0,Math.PI*2);
ctx.fillStyle=“rgba(147,197,253,”+(0.08+(i%3)*0.04)+”)”;ctx.fill();}
dWat(t);
for(var i2=0;i2<5;i2++){var fx=((t*40+i2*120)%(W+80))-40,fy=wl+40+i2*30+Math.sin(t*2+i2)*10;
ctx.font=(22+i2*2)+“px serif”;ctx.textAlign=“center”;ctx.fillText(FT[i2%FT.length].e,fx,fy);}
var cw=Math.min(360,W-40),ch=280,cx=(W-cw)/2,cy=H*0.18;
ctx.fillStyle=“rgba(255,255,255,0.92)”;rrF(cx,cy,cw,ch,24);
ctx.strokeStyle=“rgba(147,197,253,0.5)”;ctx.lineWidth=3;rrS(cx,cy,cw,ch,24);

ctx.font=“bold 28px “+F;ctx.fillStyle=”#3b82f6”;ctx.fillText(“おさかなすくい”,W/2,cy+100);
ctx.font=“13px “+F;ctx.fillStyle=”#94a3b8”;
ctx.fillText(“タップでおさかなをすくおう！”,W/2,cy+135);
ctx.fillText(“レアなおさかなを見つけてね🐈‍⬛✨”,W/2,cy+155);
ctx.font=“11px “+F;ctx.fillStyle=”#a78bfa”;
ctx.fillText(“⏱ 制限時間30秒 ｜ 🟢 ポイは5回まで破れる”,W/2,cy+182);
ctx.fillStyle=”#ef4444”;ctx.fillText(“🦀 カニに注意！さわるとポイが破れるよ！”,W/2,cy+200);
var bw=200,bh=48,bx2=(W-bw)/2,by2=cy+218;
var g=ctx.createLinearGradient(bx2,by2,bx2+bw,by2+bh);
g.addColorStop(0,”#93c5fd”);g.addColorStop(1,”#f9a8d4”);ctx.fillStyle=g;rrF(bx2,by2,bw,bh,24);
ctx.font=“bold 16px “+F;ctx.fillStyle=”#fff”;ctx.fillText(“はじめる 🐟”,W/2,by2+31);
sBtn={x:bx2,y:by2,w:bw,h:bh};
}

function dRes(t){
ctx.fillStyle=”#f0f9ff”;ctx.fillRect(0,0,W,H);dWat(t);
var cw=Math.min(380,W-32),cx=(W-cw)/2,cy=30;
ctx.fillStyle=“rgba(255,255,255,0.93)”;rrF(cx,cy,cw,H-80,24);
ctx.strokeStyle=“rgba(147,197,253,0.4)”;ctx.lineWidth=2;rrS(cx,cy,cw,H-80,24);
ctx.textAlign=“center”;ctx.font=“bold 14px “+F;ctx.fillStyle=”#a78bfa”;
ctx.fillText(“🎉 けっか 🎉”,W/2,cy+40);
var tp=0;for(var i=0;i<coll.length;i++)tp+=coll[i].p;
ctx.font=“bold 42px “+F;ctx.fillStyle=”#3b82f6”;ctx.fillText(tp+“pt”,W/2,cy+88);
ctx.font=“bold 14px “+F;ctx.fillStyle=”#94a3b8”;
ctx.fillText(“🐟 “+sc+“ぴきすくった！”,W/2,cy+112);
var rt=“⭐”,cm=“がんばったね！”;
if(tp>=30){rt=“⭐⭐⭐”;cm=“すくいの天才…！！✨”;}
else if(tp>=20){rt=“⭐⭐⭐”;cm=“すごい！おさかなマスター🐟”;}
else if(tp>=12){rt=“⭐⭐”;cm=“なかなかやるね！🌊”;}
else if(tp>=5){rt=“⭐”;cm=“いい感じ！もう一回？”;}
ctx.font=“28px serif”;ctx.fillStyle=”#000”;ctx.fillText(rt,W/2,cy+145);
ctx.font=“bold 15px “+F;ctx.fillStyle=”#f472b6”;ctx.fillText(cm,W/2,cy+175);
ctx.font=“bold 12px “+F;ctx.fillStyle=”#6366f1”;ctx.fillText(“📦 コレクション”,W/2,cy+210);
if(coll.length===0){ctx.font=“12px “+F;ctx.fillStyle=”#94a3b8”;ctx.fillText(“おさかながすくえなかった…🥲”,W/2,cy+245);
}else{var counts={};
for(var ci=0;ci<coll.length;ci++){var k=coll[ci].n;
if(!counts[k])counts[k]={nm:k,em:coll[ci].e,pt:coll[ci].p,ra:coll[ci].ra,cnt:0};counts[k].cnt++;}
var en=[];for(var kk in counts)en.push(counts[kk]);en.sort(function(a,b){return b.pt-a.pt;});
var yO=cy+230;
for(var ei=0;ei<en.length;ei++){var e=en[ei],rowY=yO+ei*34;if(rowY>H-140)break;
ctx.fillStyle=e.ra?“rgba(253,230,138,0.2)”:“rgba(147,197,253,0.08)”;rrF(cx+20,rowY-12,cw-40,30,8);
ctx.textAlign=“left”;ctx.font=“20px serif”;ctx.fillStyle=”#000”;ctx.fillText(e.em,cx+30,rowY+8);
ctx.font=“bold 13px “+F;ctx.fillStyle=e.ra?”#d97706”:”#475569”;ctx.fillText(e.nm+(e.ra?” ✨”:””),cx+60,rowY+6);
ctx.textAlign=“right”;ctx.fillStyle=”#94a3b8”;ctx.font=“bold 12px “+F;
ctx.fillText(“x”+e.cnt+”  (”+(e.pt*e.cnt)+“pt)”,cx+cw-30,rowY+6);ctx.textAlign=“center”;}}
var bw=200,bh=46,bx2=(W-bw)/2,by2=H-90;
var g=ctx.createLinearGradient(bx2,by2,bx2+bw,by2+bh);
g.addColorStop(0,”#93c5fd”);g.addColorStop(1,”#f9a8d4”);ctx.fillStyle=g;rrF(bx2,by2,bw,bh,23);
ctx.font=“bold 15px “+F;ctx.fillStyle=”#fff”;ctx.fillText(“もういっかい 🌊”,W/2,by2+29);
rBtn={x:bx2,y:by2,w:bw,h:bh};
}

function go(){st=“playing”;sc=0;hp=MH;tmr=30;tmrS=performance.now();
coll=[];fish=[];pts=[];rips=[];spls=[];wl=H*0.35;pX=W/2;pY=H/2;tX=W/2;tY=H/2;}

function tryS(x,y){
if(st!==“playing”||hp<=0)return;scoop=true;scA=1;aR(x,y);
var ca=false,hi=false;
for(var i=0;i<fish.length;i++){var f=fish[i];if(f.ct)continue;
var wy=Math.sin(f.wb)*f.wa,fx=f.x,fy=f.y+wy;
var dx=fx-x,dy2=fy-y,dist=Math.sqrt(dx*dx+dy2*dy2);
if(dist<PR+f.sz*0.4){
if(f.tp.ob){hi=true;f.ct=true;f.cy=fy;f.cm=0;hp–;aP(fx,fy,”#ef4444”,10);
aS(fx,fy-20,“🦀 ビリッ！”,”#ef4444”);
if(hp<=0){aS(W/2,H*0.3,“ポイがやぶれちゃった！”,”#ef4444”);setTimeout(function(){st=“result”;},1200);}
}else{f.ct=true;f.cy=fy;f.cm=0;sc++;coll.push(f.tp);ca=true;aP(fx,fy,f.tp.c,8);
aS(fx,fy-20,f.tp.ra?(“✨”+f.tp.n+”!✨”):(”+”+f.tp.p),f.tp.ra?”#d97706”:”#3b82f6”);
if(f.tp.ra)aP(fx,fy,”#fbbf24”,15);}}}
if(!ca&&!hi&&y>wl){hp–;aS(x,y-20,“ビリッ💦”,”#ef4444”);
if(hp<=0){aS(W/2,H*0.3,“ポイがやぶれちゃった！”,”#ef4444”);setTimeout(function(){st=“result”;},1200);}}
}

function gP(e){var r=canvas.getBoundingClientRect();var s=e.touches?e.touches[0]:e;
return{x:(s.clientX-r.left)*(W/r.width),y:(s.clientY-r.top)*(H/r.height)};}

function onT(e){e.preventDefault();var p=gP(e);
if(st===“title”){if(sBtn&&p.x>=sBtn.x&&p.x<=sBtn.x+sBtn.w&&p.y>=sBtn.y&&p.y<=sBtn.y+sBtn.h)go();}
else if(st===“playing”){tX=p.x;tY=p.y;pX=p.x;pY=p.y;tryS(p.x,p.y);}
else if(st===“result”){if(rBtn&&p.x>=rBtn.x&&p.x<=rBtn.x+rBtn.w&&p.y>=rBtn.y&&p.y<=rBtn.y+rBtn.h)st=“title”;}}
function onM(e){e.preventDefault();if(st!==“playing”)return;var p=gP(e);tX=p.x;tY=p.y;}

canvas.addEventListener(“mousedown”,onT);canvas.addEventListener(“mousemove”,onM);
canvas.addEventListener(“touchstart”,onT,{passive:false});canvas.addEventListener(“touchmove”,onM,{passive:false});

var lS=0;
function fil(a,fn){var o=[];for(var i=0;i<a.length;i++)if(fn(a[i]))o.push(a[i]);return o;}

function loop(ts){
try {
if(!ts)ts=16;
doResize();
var t=ts/1000;wl=H*0.35;

```
if(st==="title"){dTitle(t);requestAnimationFrame(loop);return;}
if(st==="result"){dRes(t);requestAnimationFrame(loop);return;}

tmr=30-(ts-tmrS)/1000;if(tmr<=0&&st==="playing"){tmr=0;st="result";}
var si=Math.max(250,450-(tmr<15?150:0));
if(ts-lS>si){var scc=Math.random()<0.4?3:2;for(var s=0;s<scc;s++)spwn();lS=ts;}
pX+=(tX-pX)*0.15;pY+=(tY-pY)*0.15;

for(var fi=0;fi<fish.length;fi++){var f=fish[fi];
  if(f.ct){f.cm++;f.cy-=2;if(f.cm>40)f.rm=true;continue;}
  f.x+=f.sp*f.d;f.wb+=f.ws;if(f.x<-60||f.x>W+60)f.rm=true;}
fish=fil(fish,function(f){return!f.rm;});

for(var pi=0;pi<pts.length;pi++){var pp=pts[pi];pp.x+=pp.vx;pp.y+=pp.vy;pp.vy+=0.08;pp.ag++;pp.a=1-pp.ag/pp.l;}
pts=fil(pts,function(p){return p.ag<p.l;});
for(var ri=0;ri<rips.length;ri++){rips[ri].r+=1.5;rips[ri].a-=0.015;}
rips=fil(rips,function(r){return r.a>0;});
for(var si2=0;si2<spls.length;si2++){spls[si2].y-=0.8;spls[si2].ag++;spls[si2].a=1-spls[si2].ag/spls[si2].l;}
spls=fil(spls,function(s){return s.ag<s.l;});
if(scA>0)scA-=0.06;if(scA<0){scA=0;scoop=false;}

var sg=ctx.createLinearGradient(0,0,0,wl);sg.addColorStop(0,"#e0f2fe");sg.addColorStop(1,"#f0f9ff");
ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
ctx.fillStyle="rgba(255,255,255,0.6)";
for(var ci=0;ci<4;ci++){var ccx=((t*15+ci*150)%(W+100))-50;
  ctx.beginPath();ctx.ellipse(ccx,40+ci*25,40+ci*10,15,0,0,Math.PI*2);ctx.fill();}
dWat(t);
for(var rdi=0;rdi<rips.length;rdi++){var rrr=rips[rdi];ctx.beginPath();ctx.arc(rrr.x,rrr.y,rrr.r,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,"+rrr.a+")";ctx.lineWidth=2;ctx.stroke();}
for(var fdi=0;fdi<fish.length;fdi++)dFish(fish[fdi],t);
for(var pdi=0;pdi<pts.length;pdi++){var ppp=pts[pdi];ctx.globalAlpha=ppp.a;
  ctx.beginPath();ctx.arc(ppp.x,ppp.y,ppp.sz,0,Math.PI*2);ctx.fillStyle=ppp.c;ctx.fill();ctx.globalAlpha=1;}
