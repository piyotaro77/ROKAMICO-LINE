<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>debug</title>
<style>
*{margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f9ff;touch-action:none;}
#log{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,0.85);color:#0f0;font:12px monospace;padding:8px;max-height:50%;overflow-y:auto;white-space:pre-wrap;}
canvas{display:block;}
</style>
</head>
<body>
<div id="log"></div>
<canvas id="c"></canvas>
<script>
var logEl = document.getElementById("log");
function log(msg) {
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

window.onerror = function(m, s, l, c, e) {
log(“ERROR: “ + m + “ (line “ + l + “)”);
return true;
};

log(“1: script start”);
log(“UA: “ + navigator.userAgent.substring(0, 80));

try {
var canvas = document.getElementById(“c”);
log(“2: canvas found = “ + !!canvas);

var W = window.innerWidth || 360;
var H = window.innerHeight || 640;
canvas.width = W;
canvas.height = H;
canvas.style.width = W + “px”;
canvas.style.height = H + “px”;
log(“3: canvas size = “ + W + “x” + H);

var ctx = canvas.getContext(“2d”);
log(“4: ctx = “ + !!ctx);

// Test basic fill
ctx.fillStyle = “#93c5fd”;
ctx.fillRect(0, 0, W, H);
log(“5: fillRect done”);

// Test arc
ctx.beginPath();
ctx.arc(W/2, H/2, 50, 0, Math.PI * 2);
ctx.fillStyle = “#f472b6”;
ctx.fill();
log(“6: arc done”);

// Test text
ctx.font = “bold 24px sans-serif”;
ctx.fillStyle = “#1e3a5f”;
ctx.textAlign = “center”;
ctx.fillText(“Canvas OK!”, W/2, H/2 + 80);
log(“7: text done”);

// Test emoji
ctx.font = “40px serif”;
ctx.fillText(”\uD83D\uDC1F”, W/2, H/2 - 80);
log(“8: emoji done”);

// Test ellipse
var hasEllipse = typeof ctx.ellipse === “function”;
log(“9: ctx.ellipse exists = “ + hasEllipse);

if (hasEllipse) {
try {
ctx.beginPath();
ctx.ellipse(W/2, H/2 + 140, 60, 20, 0, 0, Math.PI * 2);
ctx.fillStyle = “rgba(255,255,255,0.5)”;
ctx.fill();
log(“10: ellipse OK”);
} catch(e) {
log(“10: ellipse FAILED: “ + e.message);
}
}

// Test performance.now
log(“11: perf.now = “ + (typeof performance !== “undefined” && typeof performance.now === “function”));

// Test requestAnimationFrame
var rafCount = 0;
function testLoop(ts) {
rafCount++;
if (rafCount <= 3) {
log(“12: rAF #” + rafCount + “ ts=” + (ts ? Math.round(ts) : “undef”));
requestAnimationFrame(testLoop);
} else {
log(“13: rAF works OK! All tests passed.”);
log(””);
log(“Tap anywhere to dismiss this log.”);
}
}
requestAnimationFrame(testLoop);

// Test devicePixelRatio
log(“dpr: “ + (window.devicePixelRatio || 1));

logEl.addEventListener(“touchstart”, function(e) {
e.preventDefault();
logEl.style.display = “none”;
});

} catch(e) {
log(“FATAL: “ + e.message + “ | “ + e.stack);
}
</script>

</body>
</html>
