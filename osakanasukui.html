<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// roundRect polyfill for Safari and older browsers
if (!ctx.roundRect) {
CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
if (typeof r === ‘number’) r = [r, r, r, r];
const [tl, tr, br, bl] = r;
this.moveTo(x + tl, y);
this.lineTo(x + w - tr, y);
this.quadraticCurveTo(x + w, y, x + w, y + tr);
this.lineTo(x + w, y + h - br);
this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
this.lineTo(x + bl, y + h);
this.quadraticCurveTo(x, y + h, x, y + h - bl);
this.lineTo(x, y + tl);
this.quadraticCurveTo(x, y, x + tl, y);
this.closePath();
};
}

let W, H;
function resize() {
W = canvas.width = window.innerWidth;
H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener(‘resize’, resize);

// === GAME STATE ===
let state = ‘title’; // title, playing, result
let score = 0;
let poiHP = 5;
const maxPoiHP = 5;
let timer = 30;
let timerStart = 0;
let collection = [];
let particles = [];
let ripples = [];
let splashTexts = [];

// === FISH CONFIG ===
const fishTypes = [
{ name: ‘きんぎょ’, emoji: ‘🐟’, color: ‘#ff6b6b’, points: 1, speed: 1.2, size: 28, rate: 0.28 },
{ name: ‘めだか’, emoji: ‘🐠’, color: ‘#ffa94d’, points: 1, speed: 1.5, size: 24, rate: 0.22 },
{ name: ‘ねおんてとら’, emoji: ‘🐟’, color: ‘#74c0fc’, points: 2, speed: 1.8, size: 22, rate: 0.14 },
{ name: ‘くらげ’, emoji: ‘🪼’, color: ‘#d8b4fe’, points: 2, speed: 0.6, size: 30, rate: 0.09 },
{ name: ‘たつのおとしご’, emoji: ‘🐡’, color: ‘#f783ac’, points: 3, speed: 0.8, size: 26, rate: 0.07 },
{ name: ‘くろねこざかな’, emoji: ‘🐈‍⬛’, color: ‘#495057’, points: 5, speed: 2.0, size: 32, rate: 0.04, rare: true },
{ name: ‘にじいろさかな’, emoji: ‘🌈’, color: ‘#e599f7’, points: 5, speed: 1.0, size: 34, rate: 0.03, rare: true },
{ name: ‘カニ’, emoji: ‘🦀’, color: ‘#ef4444’, points: 0, speed: 0.9, size: 32, rate: 0.13, obstacle: true },
];

let fishes = [];
let poiX = W / 2, poiY = H / 2;
let poiTargetX = W / 2, poiTargetY = H / 2;
let scooping = false;
let scoopAnim = 0;
let waterLevel;

// === WATER WAVE ===
let waveOffset = 0;

function getWaterY(x, t) {
return waterLevel + Math.sin(x * 0.015 + t * 2) * 6 + Math.sin(x * 0.008 + t * 1.3) * 4;
}

// === SPAWN FISH ===
function spawnFish() {
const rand = Math.random();
let cumulative = 0;
let type = fishTypes[0];
for (const ft of fishTypes) {
cumulative += ft.rate;
if (rand < cumulative) { type = ft; break; }
}
const dir = Math.random() < 0.5 ? 1 : -1;
const yMin = waterLevel + 40;
const yMax = H - 60;
fishes.push({
type,
x: dir === 1 ? -40 : W + 40,
y: yMin + Math.random() * (yMax - yMin),
dir,
speed: type.speed * (0.7 + Math.random() * 0.6),
wobble: Math.random() * Math.PI * 2,
wobbleSpeed: 0.02 + Math.random() * 0.02,
wobbleAmp: 8 + Math.random() * 12,
size: type.size,
caught: false,
caughtY: 0,
caughtTimer: 0,
});
}

// === PARTICLES ===
function addParticles(x, y, color, count) {
for (let i = 0; i < count; i++) {
particles.push({
x, y,
vx: (Math.random() - 0.5) * 4,
vy: -Math.random() * 3 - 1,
size: 3 + Math.random() * 4,
color,
alpha: 1,
life: 40 + Math.random() * 20,
age: 0,
});
}
}

function addRipple(x, y) {
ripples.push({ x, y, r: 10, alpha: 0.6, maxR: 40 + Math.random() * 20 });
}

function addSplashText(x, y, text, color) {
splashTexts.push({ x, y, text, color, alpha: 1, age: 0, life: 50 });
}

// === POI (scoop) ===
const poiRadius = 36;

function drawPoi(x, y, hp) {
ctx.save();
ctx.translate(x, y);

// Handle
ctx.beginPath();
ctx.moveTo(0, -poiRadius - 8);
ctx.lineTo(0, -poiRadius - 28);
ctx.strokeStyle = ‘#d4a373’;
ctx.lineWidth = 5;
ctx.lineCap = ‘round’;
ctx.stroke();

// Ring
ctx.beginPath();
ctx.arc(0, 0, poiRadius, 0, Math.PI * 2);
ctx.strokeStyle = ‘#e76f51’;
ctx.lineWidth = 4;
ctx.stroke();

// Paper (with transparency based on HP)
const paperAlpha = 0.2 + (hp / maxPoiHP) * 0.5;
ctx.beginPath();
ctx.arc(0, 0, poiRadius - 3, 0, Math.PI * 2);
ctx.fillStyle = `rgba(255, 255, 255, ${paperAlpha})`;
ctx.fill();

// Crosshatch pattern for paper
if (hp > 0) {
ctx.save();
ctx.beginPath();
ctx.arc(0, 0, poiRadius - 4, 0, Math.PI * 2);
ctx.clip();
ctx.strokeStyle = `rgba(200, 200, 200, ${paperAlpha * 0.6})`;
ctx.lineWidth = 0.5;
for (let i = -poiRadius; i < poiRadius; i += 8) {
ctx.beginPath();
ctx.moveTo(i, -poiRadius);
ctx.lineTo(i, poiRadius);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(-poiRadius, i);
ctx.lineTo(poiRadius, i);
ctx.stroke();
}
ctx.restore();
}

// Tears/holes if damaged
if (hp < maxPoiHP) {
const holes = maxPoiHP - hp;
ctx.save();
ctx.beginPath();
ctx.arc(0, 0, poiRadius - 3, 0, Math.PI * 2);
ctx.clip();
for (let i = 0; i < holes; i++) {
const angle = (i / holes) * Math.PI * 2 + 0.5;
const dist = 8 + i * 4;
const hx = Math.cos(angle) * dist;
const hy = Math.sin(angle) * dist;
ctx.beginPath();
ctx.arc(hx, hy, 4 + i, 0, Math.PI * 2);
ctx.fillStyle = ‘rgba(135, 206, 250, 0.3)’;
ctx.fill();
}
ctx.restore();
}

ctx.restore();
}

// === DRAW FUNCTIONS ===
function drawWater(t) {
// Water body
ctx.beginPath();
ctx.moveTo(0, H);
for (let x = 0; x <= W; x += 4) {
ctx.lineTo(x, getWaterY(x, t));
}
ctx.lineTo(W, H);
ctx.closePath();
const grad = ctx.createLinearGradient(0, waterLevel, 0, H);
grad.addColorStop(0, ‘rgba(147, 197, 253, 0.35)’);
grad.addColorStop(0.4, ‘rgba(147, 197, 253, 0.5)’);
grad.addColorStop(1, ‘rgba(96, 165, 250, 0.6)’);
ctx.fillStyle = grad;
ctx.fill();

// Surface highlight
ctx.beginPath();
for (let x = 0; x <= W; x += 4) {
const wy = getWaterY(x, t);
if (x === 0) ctx.moveTo(x, wy);
else ctx.lineTo(x, wy);
}
ctx.strokeStyle = ‘rgba(255, 255, 255, 0.6)’;
ctx.lineWidth = 2;
ctx.stroke();
}

function drawFish(f, t) {
ctx.save();
const wobbleY = Math.sin(f.wobble) * f.wobbleAmp;
const drawX = f.x;
const drawY = f.caught ? f.caughtY : f.y + wobbleY;

ctx.translate(drawX, drawY);
if (f.dir === 1) ctx.scale(-1, 1);

// Shadow
if (!f.caught) {
ctx.fillStyle = ‘rgba(0,0,0,0.06)’;
ctx.beginPath();
ctx.ellipse(0, f.size * 0.4, f.size * 0.7, f.size * 0.15, 0, 0, Math.PI * 2);
ctx.fill();
}

// Fish body
ctx.font = `${f.size}px serif`;
ctx.textAlign = ‘center’;
ctx.textBaseline = ‘middle’;

if (f.type.rare) {
ctx.shadowColor = f.type.color;
ctx.shadowBlur = 12;
}
if (f.type.obstacle) {
ctx.shadowColor = ‘#ef4444’;
ctx.shadowBlur = 10;
}

ctx.fillText(f.type.emoji, 0, 0);
ctx.shadowBlur = 0;

// Rare sparkle
if (f.type.rare && !f.caught) {
const sparkleCount = 3;
for (let i = 0; i < sparkleCount; i++) {
const angle = t * 3 + (i / sparkleCount) * Math.PI * 2;
const sx = Math.cos(angle) * (f.size * 0.6);
const sy = Math.sin(angle) * (f.size * 0.4);
ctx.font = ‘8px serif’;
ctx.globalAlpha = 0.4 + Math.sin(t * 5 + i) * 0.3;
ctx.fillText(‘✨’, sx, sy);
}
ctx.globalAlpha = 1;
}

ctx.restore();
}

function drawUI() {
// Top bar background
ctx.fillStyle = ‘rgba(255, 255, 255, 0.85)’;
ctx.beginPath();
ctx.roundRect(12, 10, W - 24, 56, 16);
ctx.fill();
ctx.strokeStyle = ‘rgba(147, 197, 253, 0.4)’;
ctx.lineWidth = 2;
ctx.stroke();

// Score
const livePts = collection.reduce((sum, f) => sum + f.points, 0);
ctx.font = ‘900 18px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#3b82f6’;
ctx.textAlign = ‘left’;
ctx.fillText(`${livePts}pt`, 24, 36);
ctx.font = ‘700 11px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#94a3b8’;
ctx.fillText(`🐟${score}ぴき`, 24, 52);

// Timer
ctx.textAlign = ‘center’;
const timeLeft = Math.max(0, Math.ceil(timer));
ctx.fillStyle = timeLeft <= 5 ? ‘#ef4444’ : ‘#6366f1’;
ctx.fillText(`⏱ ${timeLeft}s`, W / 2, 44);

// Poi HP
ctx.textAlign = ‘right’;
let hpText = ‘’;
for (let i = 0; i < maxPoiHP; i++) {
hpText += i < poiHP ? ‘🟢’ : ‘⚫’;
}
ctx.font = ‘14px serif’;
ctx.fillText(hpText, W - 24, 42);

// Poi label
ctx.font = ‘700 10px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#94a3b8’;
ctx.fillText(‘ポイHP’, W - 50, 26);
}

// === TITLE SCREEN ===
function drawTitle(t) {
// Background
ctx.fillStyle = ‘#f0f9ff’;
ctx.fillRect(0, 0, W, H);

// Decorative bubbles
for (let i = 0; i < 15; i++) {
const bx = (W * 0.1) + (i * W * 0.06) % W;
const by = H * 0.3 + Math.sin(t * 1.5 + i * 0.8) * 30 + (i * 37) % (H * 0.5);
const br = 8 + (i % 4) * 5;
ctx.beginPath();
ctx.arc(bx, by, br, 0, Math.PI * 2);
ctx.fillStyle = `rgba(147, 197, 253, ${0.08 + (i % 3) * 0.04})`;
ctx.fill();
}

// Water at bottom
drawWater(t);

// Swimming fish on title
for (let i = 0; i < 5; i++) {
const fx = ((t * 40 + i * 120) % (W + 80)) - 40;
const fy = waterLevel + 40 + i * 30 + Math.sin(t * 2 + i) * 10;
ctx.font = `${22 + i * 2}px serif`;
ctx.textAlign = ‘center’;
ctx.fillText(fishTypes[i % fishTypes.length].emoji, fx, fy);
}

// Title card
const cardW = Math.min(360, W - 40);
const cardH = 280;
const cardX = (W - cardW) / 2;
const cardY = H * 0.18;

ctx.fillStyle = ‘rgba(255, 255, 255, 0.92)’;
ctx.beginPath();
ctx.roundRect(cardX, cardY, cardW, cardH, 24);
ctx.fill();
ctx.strokeStyle = ‘rgba(147, 197, 253, 0.5)’;
ctx.lineWidth = 3;
ctx.stroke();

// Title text
ctx.textAlign = ‘center’;
ctx.font = ‘40px serif’;
ctx.fillText(‘🌊’, W / 2, cardY + 52);

ctx.font = ‘900 28px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#3b82f6’;
ctx.fillText(‘おさかなすくい’, W / 2, cardY + 100);

ctx.font = ‘500 13px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#94a3b8’;
ctx.fillText(‘タップでおさかなをすくおう！’, W / 2, cardY + 135);
ctx.fillText(‘レアなおさかなを見つけてね🐈‍⬛✨’, W / 2, cardY + 155);

// Rules
ctx.font = ‘500 11px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#a78bfa’;
ctx.fillText(‘⏱ 制限時間30秒 ｜ 🟢 ポイは5回まで破れる’, W / 2, cardY + 182);
ctx.fillStyle = ‘#ef4444’;
ctx.fillText(‘🦀 カニに注意！さわるとポイが破れるよ！’, W / 2, cardY + 200);

// Start button
const btnW = 200;
const btnH = 48;
const btnX = (W - btnW) / 2;
const btnY = cardY + 218;

const grad = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY + btnH);
grad.addColorStop(0, ‘#93c5fd’);
grad.addColorStop(1, ‘#f9a8d4’);
ctx.fillStyle = grad;
ctx.beginPath();
ctx.roundRect(btnX, btnY, btnW, btnH, 24);
ctx.fill();

ctx.font = ‘900 16px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#fff’;
ctx.fillText(‘はじめる 🐟’, W / 2, btnY + 31);

// Store button bounds
window._startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// === RESULT SCREEN ===
function drawResult(t) {
ctx.fillStyle = ‘#f0f9ff’;
ctx.fillRect(0, 0, W, H);
drawWater(t);

const cardW = Math.min(380, W - 32);
const cardX = (W - cardW) / 2;
const cardY = 30;

// Card
ctx.fillStyle = ‘rgba(255, 255, 255, 0.93)’;
ctx.beginPath();
ctx.roundRect(cardX, cardY, cardW, H - 80, 24);
ctx.fill();
ctx.strokeStyle = ‘rgba(147, 197, 253, 0.4)’;
ctx.lineWidth = 2;
ctx.stroke();

ctx.textAlign = ‘center’;

// Result header
ctx.font = ‘900 14px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#a78bfa’;
ctx.fillText(‘🎉 けっか 🎉’, W / 2, cardY + 40);

// Calculate total points
const totalPts = collection.reduce((sum, f) => sum + f.points, 0);

// Main score = total points
ctx.font = ‘900 42px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#3b82f6’;
ctx.fillText(`${totalPts}pt`, W / 2, cardY + 88);

// Sub info = fish count
ctx.font = ‘700 14px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#94a3b8’;
ctx.fillText(`🐟 ${score}ぴきすくった！`, W / 2, cardY + 112);

// Rating based on points
let rating = ‘⭐’;
let comment = ‘がんばったね！’;
if (totalPts >= 30) { rating = ‘⭐⭐⭐’; comment = ‘すくいの天才…！！✨’; }
else if (totalPts >= 20) { rating = ‘⭐⭐⭐’; comment = ‘すごい！おさかなマスター🐟’; }
else if (totalPts >= 12) { rating = ‘⭐⭐’; comment = ‘なかなかやるね！🌊’; }
else if (totalPts >= 5) { rating = ‘⭐’; comment = ‘いい感じ！もう一回？’; }

ctx.font = ‘28px serif’;
ctx.fillText(rating, W / 2, cardY + 145);

ctx.font = ‘700 15px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#f472b6’;
ctx.fillText(comment, W / 2, cardY + 175);

// Collection
ctx.font = ‘900 12px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#6366f1’;
ctx.fillText(‘📦 コレクション’, W / 2, cardY + 210);

if (collection.length === 0) {
ctx.font = ‘500 12px “M PLUS Rounded 1c”’;
ctx.fillStyle = ‘#94a3b8’;
ctx.fillText(‘おさかながすくえなかった…🥲’, W / 2, cardY + 245);
} else {
// Count by type
const counts = {};
collection.forEach(f => {
const key = f.name;
if (!counts[key]) counts[key] = { …f, count: 0 };
counts[key].count++;
});
const entries = Object.values(counts).sort((a, b) => b.points - a.points);

// === GAME LOGIC ===
function startGame() {
state = ‘playing’;
score = 0;
poiHP = maxPoiHP;
timer = 30;
timerStart = performance.now();
collection = [];
fishes = [];
particles = [];
ripples = [];
splashTexts = [];
waterLevel = H * 0.35;
}

function tryScoopAt(x, y) {
if (state !== ‘playing’ || poiHP <= 0) return;

scooping = true;
scoopAnim = 1;
addRipple(x, y);

let caught = false;
let hitObstacle = false;
fishes.forEach(f => {
if (f.caught) return;
const wobbleY = Math.sin(f.wobble) * f.wobbleAmp;
const fx = f.x;
const fy = f.y + wobbleY;
const dist = Math.hypot(fx - x, fy - y);
if (dist < poiRadius + f.size * 0.4) {
if (f.type.obstacle) {
// Hit crab!
hitObstacle = true;
f.caught = true;
f.caughtY = fy;
f.caughtTimer = 0;
poiHP–;
addParticles(fx, fy, ‘#ef4444’, 10);
addSplashText(fx, fy - 20, ‘🦀 ビリッ！’, ‘#ef4444’);
if (poiHP <= 0) {
addSplashText(W / 2, H * 0.3, ‘ポイがやぶれちゃった！’, ‘#ef4444’);
setTimeout(() => { state = ‘result’; }, 1200);
}
} else {
// Catch fish!
f.caught = true;
f.caughtY = fy;
f.caughtTimer = 0;
score++;
collection.push(f.type);
caught = true;
addParticles(fx, fy, f.type.color, 8);
addSplashText(fx, fy - 20, f.type.rare ? `✨${f.type.name}!✨` : `+${f.type.points}`, f.type.rare ? ‘#d97706’ : ‘#3b82f6’);
if (f.type.rare) {
addParticles(fx, fy, ‘#fbbf24’, 15);
}
}
}
});

if (!caught && !hitObstacle && y > waterLevel) {
// Missed in water = poi damage
poiHP–;
addSplashText(x, y - 20, ‘ビリッ💦’, ‘#ef4444’);
if (poiHP <= 0) {
addSplashText(W / 2, H * 0.3, ‘ポイがやぶれちゃった！’, ‘#ef4444’);
setTimeout(() => { state = ‘result’; }, 1200);
}
}
}

// === INPUT ===
function getPos(e) {
const rect = canvas.getBoundingClientRect();
const touch = e.touches ? e.touches[0] : e;
return {
x: (touch.clientX - rect.left) * (canvas.width / rect.width),
y: (touch.clientY - rect.top) * (canvas.height / rect.height)
};
}

function handleTap(e) {
e.preventDefault();
const pos = getPos(e);

if (state === ‘title’) {
const btn = window._startBtn;
if (btn && pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
startGame();
}
} else if (state === ‘playing’) {
poiTargetX = pos.x;
poiTargetY = pos.y;
poiX = pos.x;
poiY = pos.y;
tryScoopAt(pos.x, pos.y);
} else if (state === ‘result’) {
const btn = window._retryBtn;
if (btn && pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
state = ‘title’;
}
}
}

function handleMove(e) {
e.preventDefault();
if (state !== ‘playing’) return;
const pos = getPos(e);
poiTargetX = pos.x;
poiTargetY = pos.y;
}

canvas.addEventListener(‘mousedown’, handleTap);
canvas.addEventListener(‘mousemove’, handleMove);
canvas.addEventListener(‘touchstart’, handleTap, { passive: false });
canvas.addEventListener(‘touchmove’, handleMove, { passive: false });

// === MAIN LOOP ===
let lastSpawn = 0;
let lastTime = 0;

function loop(timestamp) {
const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
lastTime = timestamp;
const t = timestamp / 1000;

waterLevel = H * 0.35;

if (state === ‘title’) {
drawTitle(t);
requestAnimationFrame(loop);
return;
}

if (state === ‘result’) {
drawResult(t);
requestAnimationFrame(loop);
return;
}

// === PLAYING ===
// Timer
timer = 30 - (timestamp - timerStart) / 1000;
if (timer <= 0 && state === ‘playing’) {
timer = 0;
state = ‘result’;
}

// Spawn fish - more frequently and multiple at once
const spawnInterval = Math.max(250, 450 - (timer < 15 ? 150 : 0));
if (timestamp - lastSpawn > spawnInterval) {
const spawnCount = Math.random() < 0.4 ? 3 : 2;
for (let s = 0; s < spawnCount; s++) {
spawnFish();
}
lastSpawn = timestamp;
}

// Move poi smoothly
poiX += (poiTargetX - poiX) * 0.15;
poiY += (poiTargetY - poiY) * 0.15;

// Update fish
fishes.forEach(f => {
if (f.caught) {
f.caughtTimer++;
f.caughtY -= 2;
if (f.caughtTimer > 40) f.remove = true;
return;
}
f.x += f.speed * f.dir;
f.wobble += f.wobbleSpeed;
if (f.x < -60 || f.x > W + 60) f.remove = true;
});
fishes = fishes.filter(f => !f.remove);

// Update particles
particles.forEach(p => {
p.x += p.vx;
p.y += p.vy;
p.vy += 0.08;
p.age++;
p.alpha = 1 - p.age / p.life;
});
particles = particles.filter(p => p.age < p.life);

// Update ripples
ripples.forEach(r => {
r.r += 1.5;
r.alpha -= 0.015;
});
ripples = ripples.filter(r => r.alpha > 0);

// Update splash texts
splashTexts.forEach(s => {
s.y -= 0.8;
s.age++;
s.alpha = 1 - s.age / s.life;
});
splashTexts = splashTexts.filter(s => s.age < s.life);

// Scoop anim
if (scoopAnim > 0) scoopAnim -= 0.06;
if (scoopAnim < 0) { scoopAnim = 0; scooping = false; }

// === DRAW ===
// Sky
const skyGrad = ctx.createLinearGradient(0, 0, 0, waterLevel);
skyGrad.addColorStop(0, ‘#e0f2fe’);
skyGrad.addColorStop(1, ‘#f0f9ff’);
ctx.fillStyle = skyGrad;
ctx.fillRect(0, 0, W, H);

// Clouds
ctx.fillStyle = ‘rgba(255, 255, 255, 0.6)’;
for (let i = 0; i < 4; i++) {
const cx = ((t * 15 + i * 150) % (W + 100)) - 50;
const cy = 40 + i * 25;
ctx.beginPath();
ctx.ellipse(cx, cy, 40 + i * 10, 15, 0, 0, Math.PI * 2);
ctx.fill();
}

// Water
drawWater(t);

// Ripples
ripples.forEach(r => {
ctx.beginPath();
ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
ctx.strokeStyle = `rgba(255, 255, 255, ${r.alpha})`;
ctx.lineWidth = 2;
ctx.stroke();
});

// Fish
fishes.forEach(f => drawFish(f, t));

// Particles
particles.forEach(p => {
ctx.globalAlpha = p.alpha;
ctx.beginPath();
ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
ctx.fillStyle = p.color;
ctx.fill();
ctx.globalAlpha = 1;
});

// Splash texts
splashTexts.forEach(s => {
ctx.globalAlpha = s.alpha;
ctx.font = ‘900 16px “M PLUS Rounded 1c”’;
ctx.fillStyle = s.color;
ctx.textAlign = ‘center’;
ctx.fillText(s.text, s.x, s.y);
ctx.globalAlpha = 1;
});

// Poi
if (state === ‘playing’) {
ctx.globalAlpha = 0.9;
const poiDrawY = poiY + (scooping ? Math.sin(scoopAnim * Math.PI) * 15 : 0);
drawPoi(poiX, poiDrawY, poiHP);
ctx.globalAlpha = 1;
}

// UI
drawUI();

requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
