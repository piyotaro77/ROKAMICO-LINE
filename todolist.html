<script>
// === STATE ===
let todos = [];
let currentCat = 'all';
let currentFilter = 'all';
let selectedPriority = 'mid';
let doneVisible = false;

const categories = [
  { key: 'all', label: '🌟 すべて' },
  { key: 'しごと', label: '💼 しごと' },
  { key: 'くらし', label: '🏠 くらし' },
  { key: 'つくる', label: '🎨 つくる' },
  { key: 'おでかけ', label: '🚶 おでかけ' },
  { key: 'べんきょう', label: '📚 べんきょう' },
  { key: 'その他', label: '📌 その他' },
];

// Load
try {
  const saved = localStorage.getItem('piyochan_todos');
  if (saved) todos = JSON.parse(saved);
} catch(e) {}

// === INIT ===
renderCatTabs();
renderTodos();
updateStats();

document.getElementById('formTitle').addEventListener('input', checkForm);

// === CATEGORIES ===
function renderCatTabs() {
  const container = document.getElementById('catTabs');
  container.innerHTML = '';
  categories.forEach(c => {
    const tab = document.createElement('button');
    tab.className = `cat-tab ${currentCat === c.key ? 'active' : ''}`;
    const count = c.key === 'all'
      ? todos.filter(t => !t.done).length
      : todos.filter(t => !t.done && t.category === c.key).length;
    tab.innerHTML = `${c.label}<span class="cat-count">${count}</span>`;
    tab.onclick = () => { currentCat = c.key; renderCatTabs(); renderTodos(); };
    container.appendChild(tab);
  });
}

// === FILTER / SORT ===
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

function getFilteredTodos() {
  let list = [...todos];
  const today = new Date().toISOString().split('T')[0];

  // Category
  if (currentCat !== 'all') list = list.filter(t => t.category === currentCat);

  // Filter
  if (currentFilter === 'todo') list = list.filter(t => !t.done);
  if (currentFilter === 'today') list = list.filter(t => t.due === today);

  // Split done / not done
  const active = list.filter(t => !t.done);
  const done = list.filter(t => t.done);

  // Sort active
  const sortBy = document.getElementById('sortSelect').value;
  if (sortBy === 'priority') {
    const pOrder = { high: 0, mid: 1, low: 2 };
    active.sort((a, b) => pOrder[a.priority] - pOrder[b.priority]);
  } else if (sortBy === 'due') {
    active.sort((a, b) => {
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    });
  } else {
    active.sort((a, b) => b.createdAt - a.createdAt);
  }

  return { active, done };
}

// === RENDER ===
function renderTodos() {
  const { active, done } = getFilteredTodos();
  const todoList = document.getElementById('todoList');
  const emptyState = document.getElementById('emptyState');
  const doneSection = document.getElementById('doneSection');

  todoList.innerHTML = '';
  if (active.length === 0 && done.length === 0) {
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
  }

  active.forEach(t => todoList.appendChild(createTodoEl(t)));

  // Done section
  if (done.length > 0) {
    doneSection.style.display = 'block';
    document.getElementById('doneHeaderText').textContent = `完了済み（${done.length}件）`;
    const doneList = document.getElementById('doneList');
    doneList.innerHTML = '';
    done.forEach(t => doneList.appendChild(createTodoEl(t)));
  } else {
    doneSection.style.display = 'none';
  }

  renderCatTabs();
  updateStats();
}

function createTodoEl(t) {
  const today = new Date().toISOString().split('T')[0];
  const isOverdue = t.due && t.due < today && !t.done;

  const div = document.createElement('div');
  div.className = `todo-item priority-${t.priority} ${t.done ? 'done' : ''} ${isOverdue ? 'overdue' : ''}`;

  // Due date display
  let dueText = '';
  let dueClass = 'badge-due';
  if (t.due) {
    const d = new Date(t.due + 'T00:00:00');
    const m = d.getMonth() + 1;
    const day = d.getDate();
    if (t.due === today) { dueText = `📅 きょう`; }
    else if (isOverdue) { dueText = `⚠️ 期限切れ`; dueClass = 'badge-due overdue'; }
    else { dueText = `📅 ${m}/${day}`; }
  }

  // Priority badge
  const pLabels = { high: '🔴 たかい', mid: '🟡 ふつう', low: '🟢 ひくい' };
  const pClass = { high: 'badge-priority-high', mid: 'badge-priority-mid', low: 'badge-priority-low' };

  div.innerHTML = `
    <div class="todo-check" onclick="toggleTodo('${t.id}')">${t.done ? '✓' : ''}</div>
    <div class="todo-content">
      <div class="todo-title">${escapeHtml(t.title)}</div>
      <div class="todo-meta">
        <span class="todo-badge badge-cat">${getCatEmoji(t.category)} ${t.category}</span>
        <span class="todo-badge ${pClass[t.priority]}">${pLabels[t.priority]}</span>
        ${dueText ? `<span class="todo-badge ${dueClass}">${dueText}</span>` : ''}
      </div>
    </div>
    <button class="todo-delete" onclick="deleteTodo('${t.id}')">✕</button>
  `;
  return div;
}

function getCatEmoji(cat) {
  const map = { 'しごと': '💼', 'くらし': '🏠', 'つくる': '🎨', 'おでかけ': '🚶', 'べんきょう': '📚', 'その他': '📌' };
  return map[cat] || '📌';
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// === ACTIONS ===
function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    t.doneAt = t.done ? Date.now() : null;
    save();
    renderTodos();
    if (t.done) showToast('✅ おつかれさま！');
  }
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  save();
  renderTodos();
}

function clearDone() {
  const catFilter = currentCat === 'all' ? null : currentCat;
  todos = todos.filter(t => {
    if (catFilter && t.category !== catFilter) return true;
    return !t.done;
  });
  save();
  renderTodos();
  showToast('🗑 完了済みをけしたよ');
}

function toggleDone() {
  doneVisible = !doneVisible;
  document.getElementById('doneList').classList.toggle('visible', doneVisible);
  document.getElementById('doneToggle').classList.toggle('open', doneVisible);
}

// === MODAL ===
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('formTitle').value = '';
  document.getElementById('formDue').value = '';
  selectedPriority = 'mid';
  document.querySelectorAll('.priority-opt').forEach(b => {
    b.className = 'priority-opt' + (b.dataset.p === 'mid' ? ' sel-mid' : '');
  });
  checkForm();
  setTimeout(() => document.getElementById('formTitle').focus(), 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function setPriority(p, btn) {
  selectedPriority = p;
  document.querySelectorAll('.priority-opt').forEach(b => b.className = 'priority-opt');
  btn.classList.add(`sel-${p}`);
}

function checkForm() {
  document.getElementById('formSubmit').disabled = !document.getElementById('formTitle').value.trim();
}

function addTodo() {
  const title = document.getElementById('formTitle').value.trim();
  if (!title) return;

  todos.push({
    id: 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    title,
    category: document.getElementById('formCategory').value,
    priority: selectedPriority,
    due: document.getElementById('formDue').value || null,
    done: false,
    doneAt: null,
    createdAt: Date.now(),
  });

  save();
  closeModal();
  renderTodos();
  showToast('✏️ ついかしたよ！');
}

// === STATS ===
function updateStats() {
  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statTodo').textContent = total - done;
  document.getElementById('statDone').textContent = done;
}

// === STORAGE ===
function save() {
  try { localStorage.setItem('piyochan_todos', JSON.stringify(todos)); } catch(e) {}
}

// === EXPORT / IMPORT ===
function exportData() {
  if (todos.length === 0) { showToast('📭 まだタスクがないよ'); return; }
  const data = { app: 'piyochan_todos', version: 1, exportedAt: new Date().toISOString(), todos };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const name = `todos_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`📤 ${todos.length}件のタスクを保存したよ！`);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.todos || !Array.isArray(data.todos)) {
        showToast('⚠️ ファイルの形式が違うみたい…'); return;
      }
      let added = 0;
      data.todos.forEach(t => {
        if (!todos.find(existing => existing.id === t.id)) {
          todos.push(t);
          added++;
        }
      });
      save(); renderTodos();
      showToast(`📥 ${added}件のタスクを追加したよ！`);
    } catch(err) { showToast('⚠️ ファイルが読み込めなかった…'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// === TOAST ===
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>

</body>
</html>
